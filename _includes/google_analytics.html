{% if site.data.main_info.google_analystics_tracking_id and site.data.main_info.google_analystics_tracking_id != "" %}
<!-- Google tag (gtag.js) - Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.data.main_info.google_analystics_tracking_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', '{{ site.data.main_info.google_analystics_tracking_id }}');
</script>
{% endif %}
